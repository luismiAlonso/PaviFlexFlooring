[build]
  # Railway detecta automáticamente Next.js y Python/FastAPI
  # Solo necesitas conectar el repo en railway.app

[[services]]
  name = "frontend"
  source = "frontend"
  [services.build]
    buildCommand = "npm install && npm run build"
    startCommand = "npm start"
  [services.variables]
    BACKEND_URL = "${{backend.RAILWAY_PRIVATE_DOMAIN}}"

[[services]]
  name = "backend"
  source = "backend"
  [services.build]
    buildCommand = "pip install -r requirements.txt"
    startCommand = "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
